name: Renovate

on:
  schedule:
    - cron: 0 2 * * 1
  workflow_dispatch:

permissions: read-all

jobs:
  renovate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: renovatebot/github-action@v41.0.2
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
