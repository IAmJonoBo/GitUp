name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - v*

permissions: read-all

jobs:
  package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Package VSIX
        run: pnpm --filter gitup package
      - name: Capture VSIX path
        id: capture_vsix
        run: echo "vsix_path=$(ls packages/extension/*.vsix | head -n 1)" >> "$GITHUB_OUTPUT"
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: gitup-vsix
          path: ${{ steps.capture_vsix.outputs.vsix_path }}
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.capture_vsix.outputs.vsix_path }}
